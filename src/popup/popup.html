<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup" id="popup">
    <header>
      <div class="header-left">
        <h1>ShortsBlock</h1>
        <div class="status">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Active</span>
        </div>
      </div>
      <button class="icon-btn" id="powerBtn" title="Toggle extension">
        <img id="powerIcon" src="" alt="Toggle">
      </button>
    </header>

    <main>
      <div class="toggle-card">
        <div class="toggle-info">
          <h3>Block Shorts</h3>
          <p>The rabbit hole, sealed.</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="blockShorts">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>

      <div class="toggle-card">
        <div class="toggle-info">
          <h3>Redirect Homepage</h3>
          <p>Straight to what matters.</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="redirectHomepage">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>

      <div class="toggle-card">
        <div class="toggle-info">
          <h3>Grayscale Mode</h3>
          <p>Less clickbait, more substance.</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="grayscaleMode">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>

      <div class="toggle-card">
        <div class="toggle-info">
          <h3>Hide Metrics</h3>
          <p>The count doesn't count.</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="hideMetrics">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>

      <div class="toggle-card">
        <div class="toggle-info">
          <h3>Redact Comments</h3>
          <p>Blah blah blah.</p>
        </div>
        <label class="toggle-switch">
          <input type="checkbox" id="redactComments">
          <span class="toggle-track"></span>
          <span class="toggle-thumb"></span>
        </label>
      </div>
    </main>

    <footer>
      <div class="save-status" id="saveStatus"></div>
    </footer>
  </div>

  <script src="popup.ts" type="module"></script>
</body>
</html>
